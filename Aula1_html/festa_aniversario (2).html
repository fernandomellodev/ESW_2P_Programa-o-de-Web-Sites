<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversário do Raphael</title>
    <style>
        body {
            text-align: center;
            background-color: #ADD8E6; /* Um cinza claro para destacar o convite */
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #e63946; /* Vermelho vibrante da Patrulha Canina */
            font-size: 3rem;
        }

        .banner-texto {
            color: yellow; 
            font-size: 25px; 
            background-color: #0077b6; /* Azul Royal que combina mais com o tema */
            font-weight: bold;
            padding: 20px;
            border-radius: 15px;
            margin: 20px auto;
            max-width: 800px;
        }

        .detalhes {
            color: #333;
            background-color: lightgreen;
            padding: 10px;
            font-size: 1.2rem;
            border-radius: 8px;
            margin: 10px auto;
            max-width: 400px;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>🐾 3 aninhos do Raphael 🐾</h1>

    <p class="banner-texto">
        Você está convocado para celebrar o 3º aniversário do nosso herói favorito!<br> 
        Prepare seu distintivo e venha participar dessa aventura.
    </p>

    <p class="detalhes">📅 Data: 11/09/2026</p>
    <p class="detalhes">⏰ Hora: 18:00h</p>
    <p class="detalhes">📍 Local: Rua dos Filhotes, 123</p>

    <img src="marchael.jpg" alt="Raphael e Patrulha Canina">

</body>
</html>
