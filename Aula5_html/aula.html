<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorando Iframe</title>	
</head>
<body>
    <h1>Avançando no HTML</h1>

    <iframe name="iframe1" width="900" height="500" style="border: 1px solid #ccc;">
    </iframe>
	
    <p>
        <a href="https://univassouras.edu.br/campus-saquarema/" target="iframe1">
            Clique aqui para carregar o site da Univassouras
        </a>
    </p>

    <br>

    <h3>Vídeo Incorporado:</h3>
    <iframe width="560" height="315" 
            src="https://www.youtube.com/embed/5Hn58p-hYC0" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin" 
            allowfullscreen>
    </iframe>
</body>
</html>
